services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: eldercare
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d eldercare']
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'

  mcp-server:
    build:
      context: .
      dockerfile: infra/docker/mcp-server.Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/eldercare
      REDIS_URL: redis://redis:6379/0
      APP_ENV: development
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '9000:9000'

  api-server:
    build:
      context: .
      dockerfile: infra/docker/api-server.Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/eldercare
      REDIS_URL: redis://redis:6379/0
      MCP_SERVER_URL: http://mcp-server:9000/mcp
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      APP_ENV: development
      ELDERCARE_AUTH_OPTIONAL: 'true'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      mcp-server:
        condition: service_started
    ports:
      - '8000:8000'
    volumes:
      - ./apps/api-server/uploads:/app/apps/api-server/uploads

  elder-web:
    build:
      context: .
      dockerfile: infra/docker/elder-web.Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_ELDER_DEMO_TOKEN: demo-elder-token
    depends_on:
      api-server:
        condition: service_started
    ports:
      - '3000:3000'

  family-web:
    build:
      context: .
      dockerfile: infra/docker/family-web.Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_FAMILY_DEMO_TOKEN: demo-family-token
    depends_on:
      api-server:
        condition: service_started
    ports:
      - '3001:3001'

volumes:
  postgres_data:
